<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Health Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Family Health Tracker</h1>

    <form id="healthForm">
      <label for="name">Family Member</label>
      <select id="name" required>
        <option value="">Select Member</option>
        <option>Father</option>
        <option>Mother</option>
        <option>Grandfather</option>
        <option>Grandmother</option>
        <option>Son</option>
        <option>Daughter</option>
      </select>

      <label for="date">Date</label>
      <input type="date" id="date" required>

      <label for="time">Time</label>
      <select id="time" required>
        <option value="">Select Time</option>
        <option>Morning</option>
        <option>Noon</option>
        <option>Evening</option>
      </select>

      <label for="sugar">Sugar Level (mg/dL)</label>
      <input type="number" id="sugar" min="0">

      <label for="weight">Weight (kg)</label>
      <input type="number" id="weight" step="0.1" min="0">

      <label for="systolic">Systolic BP</label>
      <input type="number" id="systolic" min="0">

      <label for="diastolic">Diastolic BP</label>
      <input type="number" id="diastolic" min="0">

      <label for="notes">Notes</label>
      <textarea id="notes" rows="4"></textarea>

      <div class="button-group">
        <button type="submit">Save Entry</button>
        <button type="reset">Reset</button>
      </div>
    </form>

    <div id="message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
